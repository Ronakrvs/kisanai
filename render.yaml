services:
  # Go API Gateway
  - type: web
    name: kisanai-gateway
    runtime: docker
    dockerfilePath: ./backend-go/Dockerfile
    dockerContext: ./backend-go
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: DISEASE_SERVICE_URL
        value: https://kisanai-disease.onrender.com/predict
      - key: FERTILIZER_SERVICE_URL
        value: https://kisanai-fertilizer.onrender.com/recommend
      - key: YIELD_SERVICE_URL
        value: https://kisanai-yield.onrender.com/predict
      - key: CHATBOT_SERVICE_URL
        value: https://kisanai-chatbot.onrender.com/chat
      - key: SUPABASE_JWT_SECRET
        value: 80944479-b868-468c-b90d-894c7c2256
      - key: ALLOWED_ORIGINS
        value: https://frontend-kke6n2zio-ronaks-projects-0e453fa2.vercel.app

  # Disease Detection
  - type: web
    name: kisanai-disease
    runtime: docker
    dockerfilePath: ./services/disease-service/Dockerfile
    dockerContext: ./services/disease-service
    plan: free
    envVars:
      - key: MODEL_PATH
        value: /app/models/disease_model.onnx

  # Fertilizer Recommendation
  - type: web
    name: kisanai-fertilizer
    runtime: docker
    dockerfilePath: ./services/fertilizer-service/Dockerfile
    dockerContext: ./services/fertilizer-service
    plan: free
    envVars:
      - key: MODEL_PATH
        value: /app/models/fertilizer_model.joblib

  # Yield Prediction
  - type: web
    name: kisanai-yield
    runtime: docker
    dockerfilePath: ./services/yield-service/Dockerfile
    dockerContext: ./services/yield-service
    plan: free
    envVars:
      - key: MODEL_PATH
        value: /app/models/yield_model.joblib

  # Chatbot
  - type: web
    name: kisanai-chatbot
    runtime: docker
    dockerfilePath: ./services/chatbot-service/Dockerfile
    dockerContext: ./services/chatbot-service
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: LLM_MODEL
        value: llama3
      - key: EMBED_MODEL
        value: BAAI/bge-small-en-v1.5
